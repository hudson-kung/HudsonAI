<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .chat-container {
            height: calc(100vh - 200px);
        }
        .message-user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message-assistant {
            background: #f3f4f6;
        }
        .typing-indicator span {
            animation: typing 1.4s infinite;
            display: inline-block;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [streamingContent, setStreamingContent] = useState('');
            const [apiUrl, setApiUrl] = useState(window.location.origin);
            const [apiKey, setApiKey] = useState('');
            const [useStreaming, setUseStreaming] = useState(true);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, streamingContent]);

            const sendMessage = async () => {
                if (!input.trim() || isLoading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setIsLoading(true);
                setStreamingContent('');

                try {
                    const endpoint = useStreaming ? '/chat/stream' : '/chat';
                    const url = `${apiUrl}${endpoint}`;
                    
                    if (useStreaming) {
                        // Streaming request
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                messages: [
                                    ...messages.map(m => ({ role: m.role, content: m.content })),
                                    { role: 'user', content: userMessage }
                                ],
                                api_key: apiKey
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let fullContent = '';

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            
                            const chunk = decoder.decode(value);
                            const lines = chunk.split('\n');
                            
                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    const dataStr = line.slice(6);
                                    if (dataStr === '[DONE]') break;
                                    
                                    try {
                                        const data = JSON.parse(dataStr);
                                        if (data.content) {
                                            fullContent += data.content;
                                            setStreamingContent(fullContent);
                                        }
                                        if (data.error) {
                                            throw new Error(data.error);
                                        }
                                    } catch (e) {
                                        console.error('Parse error:', e);
                                    }
                                }
                            }
                        }

                        setMessages(prev => [...prev, { role: 'assistant', content: fullContent }]);
                        setStreamingContent('');
                    } else {
                        // Non-streaming request
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                messages: [
                                    ...messages.map(m => ({ role: m.role, content: m.content })),
                                    { role: 'user', content: userMessage }
                                ],
                                api_key: apiKey
                            })
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.detail || 'API error');
                        }

                        const data = await response.json();
                        setMessages(prev => [...prev, { role: 'assistant', content: data.content }]);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `Error: ${error.message}. Please check your backend URL and API configuration.` 
                    }]);
                } finally {
                    setIsLoading(false);
                    setStreamingContent('');
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50">
                    <div className="container mx-auto px-4 py-8 max-w-4xl">
                        <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4">
                                <div className="flex items-center justify-between">
                                    <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h..01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                        </svg>
                                        Production Chatbot
                                    </h1>
                                    <div className="flex items-center gap-4">
                                        <label className="flex items-center gap-2 text-white text-sm">
                                            <input
                                                type="checkbox"
                                                checked={useStreaming}
                                                onChange={(e) => setUseStreaming(e.target.checked)}
                                                className="rounded"
                                            />
                                            Streaming
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-gray-50 px-6 py-3 border-b">
                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="block text-xs font-medium text-gray-700 mb-1">Backend URL</label>
                                        <input
                                            type="text"
                                            value={apiUrl}
                                            onChange={(e) => setApiUrl(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-lg text-sm"
                                            placeholder="https://your-backend.com"
                                        />
                                    </div>
                                    <div className="w-48">
                                        <label className="block text-xs font-medium text-gray-700 mb-1">API Key (optional)</label>
                                        <input
                                            type="password"
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            className="w-full px-3 py-2 border rounded-lg text-sm"
                                            placeholder="Optional"
                                        />
                                    </div>
                                </div>
                            </div>

                            <div className="chat-container overflow-y-auto p-6 space-y-4">
                                {messages.length === 0 && (
                                    <div className="text-center text-gray-400 py-12">
                                        <svg className="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 12h.01M12 12h.01M16 12h..01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                                        </svg>
                                        <p className="text-lg">Ask me anything!</p>
                                        <p className="text-sm mt-2">Configure your backend URL above to start chatting.</p>
                                    </div>
                                )}

                                {messages.map((message, index) => (
                                    <div
                                        key={index}
                                        className={`flex ${message.role === 'user' ? 'justify-end' : 'justify-start'}`}
                                    >
                                        <div
                                            className={`max-w-[80%] rounded-2xl px-4 py-3 ${
                                                message.role === 'user'
                                                    ? 'message-user text-white'
                                                    : 'message-assistant text-gray-800'
                                            }`}
                                        >
                                            <p className="whitespace-pre-wrap break-words">{message.content}</p>
                                        </div>
                                    </div>
                                ))}

                                {streamingContent && (
                                    <div className="flex justify-start">
                                        <div className="message-assistant rounded-2xl px-4 py-3">
                                            <p className="whitespace-pre-wrap break-words">{streamingContent}</p>
                                        </div>
                                    </div>
                                )}

                                {isLoading && !streamingContent && (
                                    <div className="flex justify-start">
                                        <div className="message-assistant rounded-2xl px-4 py-3">
                                            <div className="typing-indicator flex gap-1">
                                                <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                                <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                                <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="border-t border-gray-200 p-4 bg-gray-50">
                                <div className="flex gap-3">
                                    <textarea
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Type your message here... (Press Enter to send)"
                                        className="flex-1 resize-none rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                        rows={2}
                                        disabled={isLoading}
                                    />
                                    <button
                                        onClick={sendMessage}
                                        disabled={isLoading || !input.trim()}
                                        className="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-medium hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 self-end"
                                    >
                                        {isLoading ? (
                                            <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                        ) : (
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
